offline_coverage_planner:
  ros__parameters:
    geometry_backend: proxy
    method_name: dynamics_aware_greedy
    target_spacing: 12.0
    candidate_radius: 18.0
    candidate_shell_offsets: [0.0, 8.0]
    candidate_stride: 2
    coverage_threshold: 0.85
    max_viewpoints: 40
    mean_motion: 0.0011313666536110225
    transfer_duration: 80.0
    integration_dt: 1.0
    max_acceleration: 0.012
    position_gain: 0.0008
    velocity_gain: 0.08
    safety_margin: 2.0
    initial_state: [0.0, -35.0, 10.0, 0.0, 0.0, 0.0]
    output_root: data/results
